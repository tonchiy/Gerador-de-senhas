<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senhas</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
<main class="caixa">
    <h1> Gerador de senhas </h1>
    <input type="text" id="senha" readonly placeholder="Senha Gerada!">
    <br>
    <label for="quantidade">Quantidade de Caracteres</label>
    <br>
    <input type="number" id="quantidade" value="8" min="4">
    <label>
        <input type="checkbox" id="minusculas" checked>
    </label> <br>
    <label>
        Letras maiusculas
        <input type="checkbox" id="maiusculas" checked>
    </label> <br>
    <label>
        Números
        <input type="checkbox" id="números" checked>
    </label> <br>
    <label>
        Caracteres Especiais
        <input type="checkbox" id="Especiais" checked>
    </label> <br>
    <button onclick="CriarSenha()">Criar senha</button> <br>
    <button onclick="LimparSenha()">Limpar senha</button>
</main>
<script> src="script.js"></script>
</body>
</html>
